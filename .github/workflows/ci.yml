name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff check
        run: ruff check backend

  backend-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: install
        run: pip install -e "./backend[test]"
      - name: pytest
        working-directory: backend
        run: python -m pytest -q

  backend-test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: freewebui
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -e "./backend[test,postgres]"
      - name: pytest (postgres backend)
        working-directory: backend
        env:
          FREE_WEBUI_TEST_DATABASE_URL: postgresql://postgres:pg@localhost:5432/freewebui
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: frontend
        run: npm install
      - name: svelte-check
        working-directory: frontend
        run: npm run check
      # `npm run build` is intentionally not gated yet: svelte.config.js uses
      # adapter-auto with no chosen production target. Pick adapter-static (SPA)
      # or adapter-node first, then add `npm run build` here. See docs/INTEGRATION.md.

  e2e:
    # Playwright drives the real app (vite → backend on a throwaway SQLite DB →
    # a deterministic stdlib mock upstream). Boots all three via webServer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install backend (for the real API under test)
        run: pip install -e "./backend[test]"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install frontend
        working-directory: frontend
        run: npm install
      - name: install playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: e2e
        working-directory: frontend
        env:
          CI: "true"
          E2E_PYTHON: python
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
